[tool.pytest.ini_options]
# Put the repo root on sys.path so the source packages import under the bare
# `pytest` console script (CI and `make test`), not just `python -m pytest`.
pythonpath = ["."]
# Scope discovery to tests/ so pytest does not walk the whole tree, and skip the
# on-disk cache; both keep runs fast and avoid filesystem stalls.
testpaths = ["tests"]
addopts = "-p no:cacheprovider"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E501"]
